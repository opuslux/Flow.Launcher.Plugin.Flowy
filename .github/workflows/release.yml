name: Build and Release Flowy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Extract and Parse Version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $fullVersion = $tag -replace '^v\.?', ''
        $numericVersion = "1.0.0"
        if ($fullVersion -match '^(\d+\.\d+\.\d+(?:\.\d+)?)') {
            $numericVersion = $Matches[1]
        }
        echo "FULL_VERSION=$fullVersion" >> $env:GITHUB_ENV
        echo "NUMERIC_VERSION=$numericVersion" >> $env:GITHUB_ENV

    - name: Inject Version into plugin.json
      shell: pwsh
      run: |
        $json = Get-Content plugin.json -Raw | ConvertFrom-Json
        $json.Version = "${{ env.FULL_VERSION }}"
        $json | ConvertTo-Json -Depth 10 | Set-Content plugin.json

    - name: Build Project
      run: dotnet build -c Release -p:Version=${{ env.FULL_VERSION }} -p:InformationalVersion=${{ env.FULL_VERSION }} -p:AssemblyVersion=${{ env.NUMERIC_VERSION }} -p:FileVersion=${{ env.NUMERIC_VERSION }}

    - name: Prepare Release Folder
      shell: pwsh
      run: |
        mkdir ReleaseFiles
        Copy-Item -Path "bin\Release\net9.0-windows\*.dll" -Destination "ReleaseFiles" -Recurse
        Copy-Item -Path "plugin.json" -Destination "ReleaseFiles"
        Copy-Item -Path "Images" -Destination "ReleaseFiles" -Recurse
        Copy-Item -Path "README.md" -Destination "ReleaseFiles" -ErrorAction SilentlyContinue

    - name: Create Zip Archive
      shell: pwsh
      run: |
        $zipName = "Flow.Launcher.Plugin.Flowy-${{ github.ref_name }}.zip"
        Compress-Archive -Path "ReleaseFiles\*" -DestinationPath $zipName
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ env.ZIP_NAME }}
        generate_release_notes: true